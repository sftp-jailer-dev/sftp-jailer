# sftp-jailer canonical drop-in — managed by the tool; edits will be overwritten.
# Generated at <timestamp>. See README for rationale.

Match Group sftp-jailer
    ChrootDirectory %h
    ForceCommand internal-sftp -f AUTHPRIV -l INFO
    AllowTcpForwarding no
    X11Forwarding no
    PermitTunnel no
