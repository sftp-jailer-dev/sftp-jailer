name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - name: go mod verify
        run: go mod verify
      - name: Build (cgo-free static)
        run: CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" ./...
      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin exact minor (not moving v2.x tag); bump deliberately via PR.
          version: v2.1

  vuln:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  invariants:
    name: architecture invariants
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: No exec.Command outside internal/sysops
        run: bash scripts/check-no-exec-outside-sysops.sh
      - name: Exactly one tea.NewProgram
        run: bash scripts/check-single-tea-program.sh
      - name: All seven direct deps pinned to exact versions
        run: bash scripts/check-go-mod-pins.sh
      - name: Real.defaultTimeout policy check (10s)
        # Policy invariant: real.go carries the 10-second default timeout
        # for un-deadlined contexts. If this line is removed, CI fails.
        run: |
          if ! grep -q '10 \* time\.Second' internal/sysops/real.go; then
            echo "FAIL: internal/sysops/real.go is missing the '10 * time.Second' default-timeout policy line" >&2
            exit 1
          fi
      - name: No v1 Bubble Tea imports (bubbletea + bubbles + lipgloss)
        run: |
          if grep -rn 'github.com/charmbracelet/bubbletea\|github.com/charmbracelet/bubbles\|github.com/charmbracelet/lipgloss' . --include='*.go' --exclude-dir=.git; then
            echo "FAIL: v1 Bubble Tea / Bubbles / Lip Gloss paths found; v2 migration is non-negotiable"
            exit 1
          fi
